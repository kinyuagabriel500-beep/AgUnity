version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agunity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ./server
    environment:
      NODE_ENV: development
      SERVER_PORT: 4000
      SERVER_HOST: 0.0.0.0
      JWT_SECRET: change_me_to_a_long_random_secret
      JWT_EXPIRES_IN: 7d
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agunity
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
      AI_SERVICE_BASE_URL: http://ai-service:8000
      POLYGON_RPC_URL: ${POLYGON_RPC_URL:-https://polygon-rpc.com}
      POLYGON_PRIVATE_KEY: ${POLYGON_PRIVATE_KEY:-}
      IPFS_GATEWAY_URL: ${IPFS_GATEWAY_URL:-https://ipfs.io/ipfs/}
      PUBLIC_API_BASE_URL: http://localhost:4000
    ports:
      - "4000:4000"
    depends_on:
      - postgres

  ai-service:
    build:
      context: ./ai-service
    environment:
      AI_SERVICE_HOST: 0.0.0.0
      AI_SERVICE_PORT: 8000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
      WEATHER_BASE_URL: https://api.openweathermap.org/data/2.5/weather
      ALERT_CRON: "*/30 * * * *"
    ports:
      - "8000:8000"

  client:
    build:
      context: ./client
    ports:
      - "3000:80"
    depends_on:
      - server

  mobile:
    build:
      context: ./mobile
    environment:
      MOBILE_API_BASE_URL: http://server:4000/api
    ports:
      - "8081:8081"
    depends_on:
      - server

volumes:
  pgdata:
